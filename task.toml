artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log and write a JSON summary report."

[metadata]
category = "data_processing"
subcategory = "log_analysis"
task_objective = ["summarize", "transform"]
artifact_type = ["log_file", "json_report"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Read a small access log and compute a compact JSON summary of request counts, unique clients, and the most common path."
solution_explanation = "Parse the input log, count valid request lines, collect unique IPs, count the requested paths, and write the summary JSON to /app/report.json."
verification_explanation = "Verify that the report file exists and contains the expected values for total requests, unique IPs, and the most common path."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
